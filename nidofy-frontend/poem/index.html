<!DOCTYPE HTML>
<html lang="en">
    <head>
        <title>Nidofy - Poem</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <link rel="stylesheet" href="style.css">

        <script src="https://kit.fontawesome.com/a4473c4ae0.js" crossorigin="anonymous"></script>
    </head>

    <body>
        <main>
            <div class="min-vh-100">
                <div class="container px-5">
                    <div id="alert-container" class="position-fixed top-0 end-0 p-4 mt-2" style="z-index: 1055;"></div>
                    <div class="card poem">
                        <div class="card-head d-flex align-items-start">
                            <div class="col-sm-9">
                                <a href="/poetry" class="back-btn">&laquo; Poems List</a>
                                <h1 class="card-title" id="title">Loading...</h1>
                                <h6 class="card-subtitle mb-2 text-muted">Written on <span id="date">Loading</span></h6>
                            </div>
                            <div class="col-sm-3 text-end">
                                <br>
                                <br>
                                <a class="btn btn-outline-info px-3 rounded-pill" onclick="copyPoem();"><i class="fa-solid fa-copy"></i></a>
                            </div>
                        </div>
                        <div class="card-body" id="poem">
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <hr>
        <footer class="py-2 sitefooter">
            <p class="text-center text-white">Copyright &copy; Nikunj Doke 2026</p>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="/common/api.js"></script>
        <script src="/common/helper.js"></script>
        <script src="script.js"></script>
    </body>
</html>
